site: gemini-web
name: read
description: Read the last response from Gemini
domain: gemini.google.com

args: {}

pipeline:
  - navigate: https://gemini.google.com/app

  - wait: 5

  - evaluate: |
      (() => {
        const chatWindow = document.querySelector('chat-window');
        let responseText = '';
        let allText = [];

        if (chatWindow) {
          // Get all text content from chat window
          const textContent = chatWindow.textContent || '';

          // Split into lines and filter
          const lines = textContent.split('\n')
            .map(l => l.trim())
            .filter(l => l.length > 10);

          // Gemini responses are usually longer
          // Skip short UI text like button labels
          const substantialLines = lines.filter(l => l.length > 30);

          if (substantialLines.length > 0) {
            responseText = substantialLines[substantialLines.length - 1];
          } else if (lines.length > 0) {
            responseText = lines[lines.length - 1];
          }
        }

        // Fallback: check main area
        if (!responseText) {
          const main = document.querySelector('main');
          if (main) {
            const text = main.textContent || '';
            const lines = text.split('\n')
              .map(l => l.trim())
              .filter(l => l.length > 30);
            if (lines.length > 0) {
              responseText = lines[lines.length - 1];
            }
          }
        }

        if (responseText) {
          return [{ text: responseText.substring(0, 3000) }];
        }

        return [{ text: 'No response found. Try asking a question first with "opencli gemini ask"' }];
      })()

columns: [text]
