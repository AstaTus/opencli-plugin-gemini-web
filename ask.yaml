site: gemini-web
name: ask
description: Ask Gemini a question and wait for response
domain: gemini.google.com

args:
  prompt:
    type: string
    required: true
    positional: true
    description: "Question to ask Gemini"
  timeout:
    type: int
    default: 180
    description: "Max seconds to wait for response"

pipeline:
  - navigate: https://gemini.google.com/app

  - wait: 3

  - evaluate: |
      (async () => {
        const prompt = ${{ JSON.stringify(args.prompt) }};
        const maxTimeout = ${{ args.timeout }} * 1000;
        const startTime = Date.now();

        // Find input area
        const inputEl = document.querySelector('rich-textarea div.ql-editor');
        if (!inputEl) {
          return [{ text: 'Error: Cannot find input area' }];
        }

        // Focus and fill
        inputEl.focus();
        await new Promise(r => setTimeout(r, 300));
        document.execCommand('selectAll', false, null);
        document.execCommand('delete', false, null);
        await new Promise(r => setTimeout(r, 100));
        document.execCommand('insertText', false, prompt);
        await new Promise(r => setTimeout(r, 500));

        // Click send button
        let sent = false;
        document.querySelectorAll('button').forEach(btn => {
          const label = btn.getAttribute('aria-label');
          if ((label === '发送' || label === 'Send') && !btn.disabled) {
            btn.click();
            sent = true;
          }
        });

        if (!sent) {
          inputEl.dispatchEvent(new KeyboardEvent('keydown', { key: 'Enter', keyCode: 13, bubbles: true }));
          inputEl.dispatchEvent(new KeyboardEvent('keyup', { key: 'Enter', keyCode: 13, bubbles: true }));
        }

        await new Promise(r => setTimeout(r, 3000));

        // Poll until response complete
        let lastResponse = '';
        let stableCount = 0;

        while (Date.now() - startTime < maxTimeout) {
          // Check if still generating
          const stopBtn = document.querySelector('button[aria-label="停止生成"]') ||
                         document.querySelector('button[aria-label*="Stop"]');
          const isGenerating = !!stopBtn;

          // Get response from model-response element
          const chatWindow = document.querySelector('chat-window');
          let response = '';

          if (chatWindow) {
            // Method 1: model-response
            const modelResponse = chatWindow.querySelector('model-response');
            if (modelResponse) {
              response = modelResponse.innerText?.trim() || '';
            }

            // Method 2: Look for response after "Gemini 说"
            if (!response) {
              const fullText = chatWindow.innerText || '';
              const parts = fullText.split('Gemini 说');
              if (parts.length > 1) {
                // Get text after last "Gemini 说", remove UI noise
                let candidate = parts[parts.length - 1]
                  .replace(/工具[\s\S]*$/, '')
                  .replace(/Gemini 是一款[\s\S]*$/, '')
                  .trim();
                if (candidate.length > 5) {
                  response = candidate;
                }
              }
            }

            // Method 3: Find message-content after user-query
            if (!response) {
              const userQuery = chatWindow.querySelector('user-query-content');
              if (userQuery) {
                let sibling = userQuery.nextElementSibling;
                while (sibling) {
                  if (sibling.innerText && sibling.innerText.length > 10) {
                    response = sibling.innerText.trim();
                    break;
                  }
                  sibling = sibling.nextElementSibling;
                }
              }
            }
          }

          // Check stability
          if (response && response === lastResponse) {
            stableCount++;
            if (stableCount >= 3 && !isGenerating) {
              return [{ text: response.substring(0, 5000) }];
            }
          } else {
            lastResponse = response;
            stableCount = 0;
          }

          await new Promise(r => setTimeout(r, 1000));
        }

        // Timeout
        if (lastResponse) {
          return [{ text: lastResponse.substring(0, 5000) }];
        }

        return [{ text: 'Timeout: No response received.' }];
      })()

columns: [text]
