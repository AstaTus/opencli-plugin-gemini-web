site: gemini
name: new
description: Start a new conversation in Gemini
domain: gemini.google.com

args: {}

pipeline:
  - navigate: https://gemini.google.com/app

  - wait: 2

  - evaluate: |
      (() => {
        const newChatSelectors = [
          'button[aria-label*="New chat"]',
          'button[aria-label*="new conversation"]',
          'button[data-test-id="new-chat"]',
          '.new-chat-button',
          'a[href="/app"]'
        ];

        let clicked = false;
        for (const sel of newChatSelectors) {
          const btn = document.querySelector(sel);
          if (btn && !btn.disabled) {
            btn.click();
            clicked = true;
            break;
          }
        }

        return [{ status: clicked ? 'New conversation started' : 'Navigated to Gemini' }];
      })()

columns: [status]
