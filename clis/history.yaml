site: gemini
name: history
description: List recent Gemini conversations
domain: gemini.google.com

args:
  limit:
    type: int
    default: 10

pipeline:
  - navigate: https://gemini.google.com/app

  - wait: 3

  - evaluate: |
      (() => {
        const limit = ${{ args.limit }};

        // Find conversation history items in sidebar
        const historySelectors = [
          'conversation-list-item',
          '.conversation-item',
          'nav a[href*="/app/"]',
          '.history-item',
          'mat-list-item a'
        ];

        let items = [];

        for (const sel of historySelectors) {
          const elements = document.querySelectorAll(sel);
          if (elements.length > 0) {
            elements.forEach((el, idx) => {
              const titleEl = el.querySelector('.title, .conversation-title, span, p') || el;
              const title = titleEl?.textContent?.trim() || 'Untitled';

              // Skip UI elements
              if (title.length > 2 && !title.includes('新对话') && !title.includes('New chat')) {
                items.push({
                  rank: items.length + 1,
                  title: title.substring(0, 60),
                  date: ''
                });
              }
            });
            if (items.length > 0) break;
          }
        }

        if (items.length === 0) {
          return [{ rank: 1, title: 'No conversations found', date: '' }];
        }

        return items.slice(0, limit);
      })()

columns: [rank, title, date]
